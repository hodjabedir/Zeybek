
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yöresel Zeybek Oyunları</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <main>
            <div id="map"></div>

            <aside id="detay-paneli">
                <div class="panel-header">
                    <h2> Zeybek Detayları</h2>
                    <div class="search-box">
                        <input type="text" id="arama" placeholder="🔍 Zeybek veya yöre ara...">
                    </div>
                </div>

                <div class="panel-body">
                    <div class="ipucu">
                        <div class="ipucu-icon">🗺️</div>
                        <p>Haritadaki bir işaretçiye tıklayarak zeybek detaylarını görüntüleyin</p>
                    </div>
                    <div id="detay-icerik"></div>

                    <div class="liste-baslik">Tüm Zeybekler</div>
                    <div id="zeybek-listesi"></div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="zeybekler.js"></script>
    <script src="script.js"></script>
</body>
</html>
